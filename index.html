<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UP-GLE 업무 스타일 진단</title>
  <style>
    :root {
      --red: #e53935;
      --deep-red: #b71c1c;
      --soft-red: #ffebee;
      --soft-red-2: #fff7f7;
      --black: #18181b;
      --gray-900: #27272a;
      --gray-700: #3f3f46;
      --gray-600: #52525b;
      --gray-500: #71717a;
      --gray-400: #a1a1aa;
      --gray-300: #d4d4d8;
      --gray-200: #e4e4e7;
      --gray-100: #f4f4f5;
      --white: #ffffff;
      --shadow: 0 16px 40px rgba(181, 28, 28, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--white);
      color: var(--black);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      word-break: keep-all;
    }

    button {
      font-family: inherit;
      cursor: pointer;
      border: 0;
    }

    .app {
      min-height: 100vh;
      padding: 32px 20px;
      display: flex;
      justify-content: center;
    }

    .screen {
      width: 100%;
      max-width: 440px;
      min-height: calc(100vh - 64px);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 32px;
    }

    .result-screen {
      width: 100%;
      max-width: 440px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
    }

    .logo {
      font-size: 21px;
      font-weight: 900;
      letter-spacing: -0.04em;
      color: var(--deep-red);
    }

    .pill {
      padding: 9px 15px;
      border-radius: 999px;
      background: var(--soft-red);
      color: var(--deep-red);
      font-size: 14px;
      font-weight: 800;
      white-space: nowrap;
    }

    .hero {
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 28px;
      align-items: center;
    }

    .hero-icon-wrap {
      width: 176px;
      height: 176px;
      border-radius: 999px;
      background: var(--soft-red);
      display: flex;
      align-items: center;
      justify-content: center;
      animation: popIn 0.55s ease both;
    }

    .hero-icon {
      width: 112px;
      height: 112px;
      border-radius: 999px;
      background: var(--white);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--shadow);
    }

    .hero-icon svg { width: 54px; height: 54px; stroke: var(--red); }

    h1, h2, h3, p { margin: 0; }

    .hero-title {
      font-size: 40px;
      line-height: 1.16;
      letter-spacing: -0.06em;
      font-weight: 950;
    }

    .hero-desc {
      margin-top: 18px;
      color: var(--gray-600);
      font-size: 16px;
      line-height: 1.75;
      font-weight: 500;
    }

    .primary-btn {
      width: 100%;
      min-height: 58px;
      border-radius: 20px;
      background: var(--red);
      color: var(--white);
      font-size: 16px;
      font-weight: 850;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 14px 32px rgba(229, 57, 53, 0.22);
      transition: transform 0.16s ease, background 0.16s ease;
    }

    .primary-btn:hover { background: var(--deep-red); }
    .primary-btn:active { transform: translateY(1px) scale(0.99); }

    .secondary-btn {
      width: 100%;
      min-height: 54px;
      border-radius: 18px;
      border: 1px solid var(--red);
      background: var(--white);
      color: var(--red);
      font-size: 15px;
      font-weight: 850;
    }

    .ghost-btn {
      padding: 10px 12px;
      border-radius: 14px;
      background: transparent;
      color: var(--gray-500);
      font-size: 14px;
      font-weight: 800;
    }

    .progress-wrap { display: flex; flex-direction: column; gap: 14px; }

    .question-count {
      color: var(--gray-500);
      font-size: 14px;
      font-weight: 850;
    }

    .progress-bg {
      width: 100%;
      height: 12px;
      border-radius: 999px;
      background: var(--soft-red);
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      border-radius: 999px;
      background: var(--red);
      transition: width 0.28s ease;
    }

    .question-area {
      display: flex;
      flex-direction: column;
      gap: 32px;
      animation: fadeUp 0.24s ease both;
    }

    .question-title {
      font-size: 30px;
      line-height: 1.34;
      letter-spacing: -0.045em;
      font-weight: 950;
    }

    .score-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
    }

    .score-btn {
      height: 66px;
      border-radius: 20px;
      border: 1px solid var(--gray-200);
      background: var(--white);
      color: var(--gray-400);
      font-size: 21px;
      font-weight: 950;
      transition: all 0.16s ease;
    }

    .score-btn:hover { background: var(--soft-red-2); }
    .score-btn.selected {
      border-color: var(--red);
      background: var(--red);
      color: var(--white);
      box-shadow: 0 16px 30px rgba(229, 57, 53, 0.18);
      transform: scale(1.02);
    }
    .score-btn:disabled { cursor: not-allowed; }

    .scale-labels {
      display: flex;
      justify-content: space-between;
      color: var(--gray-400);
      font-size: 14px;
      font-weight: 750;
    }

    .hint-box {
      border-radius: 20px;
      background: var(--soft-red-2);
      color: var(--gray-500);
      padding: 16px 18px;
      text-align: center;
      font-size: 14px;
      font-weight: 750;
      line-height: 1.55;
    }

    .card {
      background: var(--white);
      border: 1px solid var(--gray-100);
      border-radius: 26px;
      padding: 24px;
      box-shadow: 0 10px 28px rgba(24, 24, 27, 0.04);
    }

    .main-result-card {
      border: 0;
      border-radius: 32px;
      background: var(--soft-red-2);
      text-align: center;
      padding: 30px 24px;
    }

    .level-label {
      color: var(--red);
      font-size: 14px;
      font-weight: 900;
    }

    .result-title {
      margin-top: 8px;
      font-size: 38px;
      line-height: 1.15;
      letter-spacing: -0.06em;
      font-weight: 950;
    }

    .result-tone {
      margin-top: 10px;
      color: var(--gray-500);
      font-size: 14px;
      font-weight: 800;
    }

    .result-desc {
      margin-top: 22px;
      color: var(--gray-700);
      font-size: 16px;
      line-height: 1.7;
      font-weight: 550;
    }

    .gauge-wrap {
      position: relative;
      width: 176px;
      height: 176px;
      margin: 26px auto 0;
    }

    .gauge-wrap svg { transform: rotate(-90deg); }

    .gauge-track { stroke: #fdecec; }
    .gauge-value {
      stroke: var(--red);
      stroke-linecap: round;
      transition: stroke-dashoffset 0.9s ease;
    }

    .gauge-center {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .gauge-score {
      color: var(--deep-red);
      font-size: 50px;
      line-height: 1;
      font-weight: 950;
      letter-spacing: -0.06em;
    }

    .gauge-label {
      margin-top: 6px;
      color: var(--gray-500);
      font-size: 11px;
      font-weight: 850;
      letter-spacing: 0.28em;
    }

    .card-title {
      font-size: 18px;
      font-weight: 950;
      letter-spacing: -0.03em;
      margin-bottom: 18px;
    }

    .bar-list { display: flex; flex-direction: column; gap: 18px; }

    .bar-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 850;
    }

    .bar-score { color: var(--red); font-weight: 950; }

    .bar-bg {
      height: 12px;
      border-radius: 999px;
      background: var(--soft-red);
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      width: 0%;
      border-radius: 999px;
      background: var(--red);
      transition: width 0.85s ease;
    }

    .dark-card {
      background: var(--black);
      color: var(--white);
      border: 0;
    }

    .dark-label {
      color: #fecaca;
      font-size: 14px;
      font-weight: 850;
      margin-bottom: 8px;
    }

    .dark-title {
      font-size: 25px;
      font-weight: 950;
      letter-spacing: -0.04em;
      margin-bottom: 12px;
    }

    .dark-desc {
      color: var(--gray-300);
      font-size: 16px;
      line-height: 1.7;
      font-weight: 500;
    }

    .mission-list { display: flex; flex-direction: column; gap: 12px; }

    .mission-item {
      display: flex;
      align-items: center;
      gap: 12px;
      border-radius: 18px;
      background: var(--soft-red-2);
      padding: 15px 16px;
      color: var(--gray-900);
      font-size: 15px;
      font-weight: 800;
      line-height: 1.45;
    }

    .mission-item svg {
      width: 20px;
      height: 20px;
      flex: 0 0 auto;
      stroke: var(--red);
    }

    .button-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      padding-bottom: 12px;
    }

    .hidden { display: none !important; }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.92); }
      to { opacity: 1; transform: scale(1); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 380px) {
      .hero-title { font-size: 34px; }
      .question-title { font-size: 26px; }
      .score-btn { height: 58px; border-radius: 17px; }
      .result-title { font-size: 32px; }
      .button-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div id="app" class="app"></div>

  <script>
    "use strict";

    const questions = [
      { id: 1, key: "control", text: "업무를 줄이면 예상치 못한 문제가 생길 것 같다." },
      { id: 2, key: "control", text: "내가 직접 확인하지 않으면 불안하다." },
      { id: 3, key: "control", text: "보고나 공유를 줄이면 사고가 날 것 같다." },
      { id: 4, key: "control", text: "프로세스를 단순화하면 품질이 떨어질 것 같다." },
      { id: 5, key: "control", text: "업무 자동화보다 직접 처리하는 것이 더 안심된다." },
      { id: 6, key: "value", text: "바쁘지 않으면 내가 중요한 사람처럼 느껴지지 않는다." },
      { id: 7, key: "value", text: "업무량이 줄면 조직 내 존재감도 줄어드는 느낌이다." },
      { id: 8, key: "value", text: "많은 일을 처리하는 것이 내 경쟁력이라고 생각한다." },
      { id: 9, key: "value", text: "업무를 줄이는 사람은 책임감이 부족해 보인다." },
      { id: 10, key: "value", text: "쉴 때보다 바쁠 때 더 안정감을 느낀다." },
      { id: 11, key: "risk", text: "업무를 없앴다가 문제가 생기면 내 책임이 될 것 같다." },
      { id: 12, key: "risk", text: "비효율적이어도 기존 방식을 유지하는 편이 안전하다." },
      { id: 13, key: "risk", text: "새로운 방식 도입은 실패 리스크가 크다고 느낀다." },
      { id: 14, key: "risk", text: "업무를 줄이는 결정은 부담스럽다." },
      { id: 15, key: "risk", text: "그냥 하던 대로 하는 것이 심리적으로 편하다." },
      { id: 16, key: "inertia", text: "현재 방식이 비효율적이어도 쉽게 바꾸지 않는다." },
      { id: 17, key: "inertia", text: "익숙한 업무 방식에서 벗어나는 것이 스트레스다." },
      { id: 18, key: "inertia", text: "새로운 시스템 적응보다 기존 방식을 선호한다." },
      { id: 19, key: "inertia", text: "업무 개선보다 업무 유지가 더 편하다." },
      { id: 20, key: "inertia", text: "불필요하다고 느끼는 업무도 계속 반복하는 편이다." }
    ];

    const areaLabels = {
      control: "통제 불안",
      value: "존재 가치 의존",
      risk: "책임 회피 불안",
      inertia: "관성 유지 성향"
    };

    const levelData = [
      {
        min: 0,
        max: 24,
        level: "LEVEL 1",
        name: "업무 슬림형",
        tone: "효율 중심",
        desc: "불필요한 업무를 비교적 잘 정리하며 변화 수용도가 높습니다.",
        risk: "지나친 단순화로 디테일이 누락될 수 있습니다.",
        actions: ["자동화 리더 역할 맡기", "업무 삭제 기준 공유하기", "개선 사례 확산하기"]
      },
      {
        min: 25,
        max: 49,
        level: "LEVEL 2",
        name: "안정 관리형",
        tone: "균형 중심",
        desc: "효율과 안정 사이에서 비교적 균형을 유지합니다.",
        risk: "상황에 따라 불필요한 업무를 다시 붙잡을 수 있습니다.",
        actions: ["월 1회 업무 점검", "반복 업무 목록화", "줄일 수 있는 보고 찾기"]
      },
      {
        min: 50,
        max: 74,
        level: "LEVEL 3",
        name: "업무 고착형",
        tone: "유지 성향 높음",
        desc: "업무 삭제보다 유지에서 심리적 안정감을 느끼는 경향이 있습니다.",
        risk: "보고 과잉, 확인 과잉, 업무 비대화가 발생할 수 있습니다.",
        actions: ["안 해보기 실험", "CC 한 명 줄이기", "반복 보고 1개 제거 검토"]
      },
      {
        min: 75,
        max: 100,
        level: "LEVEL 4",
        name: "불안 기반 과몰입형",
        tone: "불안 작동 강함",
        desc: "불안과 책임감 때문에 업무를 놓지 못하는 경향이 강합니다.",
        risk: "번아웃, 위임 실패, 조직 생산성 저하로 이어질 수 있습니다.",
        actions: ["리더와 업무 삭제 기준 합의", "위임 연습", "실패 허용 범위 정하기"]
      }
    ];

    const state = {
      started: false,
      done: false,
      step: 0,
      answers: {},
      isAdvancing: false
    };

    const app = document.getElementById("app");

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function getLevel(score) {
      return levelData.find((item) => score >= item.min && score <= item.max) || levelData[0];
    }

    function getResult(answers) {
      const total = Object.values(answers).reduce((sum, value) => sum + Number(value || 0), 0);
      const uwai = Math.max(0, Math.min(100, Math.round(((total - 20) / 80) * 100)));
      const areaScores = { control: 0, value: 0, risk: 0, inertia: 0 };

      questions.forEach((q) => {
        areaScores[q.key] += Number(answers[q.id] || 0);
      });

      const topArea = Object.entries(areaScores).sort((a, b) => b[1] - a[1])[0] || ["control", 0];
      return { total, uwai, areaScores, topArea };
    }

    function iconClipboard() {
      return `
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="8" y="2" width="8" height="4" rx="1"></rect>
          <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path>
          <path d="M9 12h6"></path>
          <path d="M9 16h6"></path>
        </svg>`;
    }

    function iconCheck() {
      return `
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
          <path d="m9 11 3 3L22 4"></path>
        </svg>`;
    }

    function renderIntro() {
      app.innerHTML = `
        <main class="screen">
          <header class="header">
            <div class="logo">UP-GLE</div>
            <div class="pill">약 3분</div>
          </header>

          <section class="hero">
            <div class="hero-icon-wrap">
              <div class="hero-icon">${iconClipboard()}</div>
            </div>
            <div>
              <h1 class="hero-title">나의 일하는 방식은<br />어떤 모습일까?</h1>
              <p class="hero-desc">평소 업무 상황에서의 판단과 반응을 바탕으로<br />나에게 맞는 업무 스타일 리포트를 확인해보세요.</p>
            </div>
          </section>

          <button class="primary-btn" id="startBtn" type="button">진단 시작하기 <span aria-hidden="true">→</span></button>
        </main>
      `;

      document.getElementById("startBtn").addEventListener("click", () => {
        state.started = true;
        render();
      });
    }

    function renderQuestion() {
      const safeStep = Math.min(Math.max(state.step, 0), questions.length - 1);
      const current = questions[safeStep];
      const progress = Math.min(100, Math.round(((safeStep + 1) / questions.length) * 100));

      if (!current) {
        state.done = true;
        render();
        return;
      }

      const scores = [1, 2, 3, 4, 5].map((score) => {
        const selected = state.answers[current.id] === score;
        return `<button class="score-btn${selected ? " selected" : ""}" data-score="${score}" type="button" ${state.isAdvancing ? "disabled" : ""}>${score}</button>`;
      }).join("");

      app.innerHTML = `
        <main class="screen">
          <header class="progress-wrap">
            <div class="header">
              <div class="logo">UP-GLE</div>
              <div class="question-count">Q ${String(safeStep + 1).padStart(2, "0")} / 20</div>
            </div>
            <div class="progress-bg"><div class="progress-fill" style="width:${progress}%"></div></div>
          </header>

          <section class="question-area">
            <h1 class="question-title">“${escapeHtml(current.text)}”</h1>
            <div class="score-grid">${scores}</div>
            <div class="scale-labels">
              <span>전혀 아니다</span>
              <span>매우 그렇다</span>
            </div>
          </section>

          <div class="hint-box">가장 가까운 번호를 선택하면 자동으로 다음 문항으로 이동합니다.</div>
        </main>
      `;

      document.querySelectorAll(".score-btn").forEach((button) => {
        button.addEventListener("click", () => selectAnswer(Number(button.dataset.score)));
      });
    }

    function selectAnswer(score) {
      if (state.isAdvancing) return;

      const safeStep = Math.min(Math.max(state.step, 0), questions.length - 1);
      const current = questions[safeStep];
      if (!current) return;

      state.answers[current.id] = score;
      state.isAdvancing = true;
      renderQuestion();

      window.setTimeout(() => {
        if (safeStep >= questions.length - 1) {
          state.done = true;
        } else {
          state.step = Math.min(safeStep + 1, questions.length - 1);
        }
        state.isAdvancing = false;
        render();
      }, 160);
    }

    function renderGauge(value) {
      const radius = 88;
      const stroke = 18;
      const normalizedRadius = radius - stroke / 2;
      const circumference = normalizedRadius * 2 * Math.PI;
      const strokeDashoffset = circumference - (value / 100) * circumference;

      return `
        <div class="gauge-wrap">
          <svg width="176" height="176" viewBox="0 0 176 176" aria-hidden="true">
            <circle class="gauge-track" fill="transparent" stroke-width="${stroke}" r="${normalizedRadius}" cx="${radius}" cy="${radius}"></circle>
            <circle class="gauge-value" fill="transparent" stroke-width="${stroke}" r="${normalizedRadius}" cx="${radius}" cy="${radius}"
              stroke-dasharray="${circumference} ${circumference}" stroke-dashoffset="${strokeDashoffset}"></circle>
          </svg>
          <div class="gauge-center">
            <div class="gauge-score">${value}</div>
            <div class="gauge-label">UWAI</div>
          </div>
        </div>`;
    }

    function renderBar(label, value) {
      const percent = Math.max(0, Math.min(100, Math.round(((value - 5) / 20) * 100)));
      return `
        <div>
          <div class="bar-head">
            <span>${escapeHtml(label)}</span>
            <span class="bar-score">${value}/25</span>
          </div>
          <div class="bar-bg"><div class="bar-fill" style="width:${percent}%"></div></div>
        </div>`;
    }

    function renderResult() {
      const result = getResult(state.answers);
      const level = getLevel(result.uwai);
      const topAreaLabel = areaLabels[result.topArea[0]] || "주요 영역";
      const bars = Object.entries(result.areaScores).map(([key, value]) => renderBar(areaLabels[key], value)).join("");
      const missions = level.actions.map((action) => `<div class="mission-item">${iconCheck()}<span>${escapeHtml(action)}</span></div>`).join("");

      app.innerHTML = `
        <main class="result-screen">
          <header class="header">
            <div class="logo">UP-GLE</div>
            <button class="ghost-btn" id="resetTopBtn" type="button">↻ 다시</button>
          </header>

          <section class="main-result-card">
            <div class="level-label">${escapeHtml(level.level)}</div>
            <h2 class="result-title">${escapeHtml(level.name)}</h2>
            <p class="result-tone">${escapeHtml(level.tone)}</p>
            ${renderGauge(result.uwai)}
            <p class="result-desc">${escapeHtml(level.desc)}</p>
          </section>

          <section class="card">
            <h3 class="card-title">세부 리포트</h3>
            <div class="bar-list">${bars}</div>
          </section>

          <section class="card dark-card">
            <div class="dark-label">주요 참고 영역</div>
            <h3 class="dark-title">${escapeHtml(topAreaLabel)}</h3>
            <p class="dark-desc">${escapeHtml(level.risk)}</p>
          </section>

          <section class="card">
            <h3 class="card-title">오늘의 업무 다이어트 미션</h3>
            <div class="mission-list">${missions}</div>
          </section>

          <div class="button-grid">
            <button class="primary-btn" id="saveBtn" type="button">결과 저장</button>
            <button class="secondary-btn" id="resetBottomBtn" type="button">다시 진단</button>
          </div>
        </main>
      `;

      document.getElementById("resetTopBtn").addEventListener("click", reset);
      document.getElementById("resetBottomBtn").addEventListener("click", reset);
      document.getElementById("saveBtn").addEventListener("click", saveResult);
    }

    function reset() {
      state.started = false;
      state.done = false;
      state.step = 0;
      state.answers = {};
      state.isAdvancing = false;
      render();
    }

    function saveResult() {
      const result = getResult(state.answers);
      const level = getLevel(result.uwai);
      const rows = Object.entries(result.areaScores)
        .map(([key, value]) => `${areaLabels[key]}: ${value}/25`)
        .join("\n");
      const text = [
        "UP-GLE 업무 스타일 리포트",
        "",
        `결과: ${level.name} (${level.level})`,
        `UWAI: ${result.uwai}`,
        `설명: ${level.desc}`,
        "",
        "세부 리포트",
        rows,
        "",
        "추천 미션",
        ...level.actions.map((item) => `- ${item}`)
      ].join("\n");

      const blob = new Blob([text], { type: "text/plain;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "upgle_work_style_result.txt";
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    function render() {
      if (!state.started) {
        renderIntro();
      } else if (state.done) {
        renderResult();
      } else {
        renderQuestion();
      }
    }

    render();
  </script>
</body>
</html>
